<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 2</title>
</head>
<body>
    <div>
        <h1>Desafio 2:<h1/>
        <h2>Transformações em SVG<h2/>
    <div/>
    <!-- https://developer.mozilla.org/en-US/docs/Web/SVG/Reference/Attribute/transform -->
    <svg width = "500" heigh = "500" viewBox = "0 0 500 500">
        <circle cx = "190" cy = "190" r = "20" style = "fill:blue;"/>
        <g id="amarelo"
            fill="#ffef00"
            transform="matrix(3 1 -1 3 30 40)">
            <polygon points = "20 20, 20 120, 100 80"/> 
        </g> 
        <use xlink:href="#amarelo" transform = "rotate(0, 200, 200)">

    </svg>
    <div>
        <h5>Sobre o uso de IA: não foi utilizada ferramente de IA.<h5/>
    <div/>

</body>
</html>
